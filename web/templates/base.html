<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Oldplay{% endblock %}</title>
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="{{ get_url(path='/') }}">Oldplay</a>
      <nav>
        <a href="{{ get_url(path='/') }}">Home</a>
        <a href="{{ get_url(path='/doc/') }}">Documentation</a>
        <a href="https://github.com/sasq64/rustplay">GitHub</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>Available on <a href="https://crates.io/crates/oldplay">crates.io</a></p>
    </div>
  </footer>
  <script>
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.copy-btn');
      if (!btn) return;
      navigator.clipboard.writeText(btn.dataset.copy || '').then(function() {
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1500);
      });
    });
  </script>
</body>
</html>
